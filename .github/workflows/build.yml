name: Build
on:
  push:
    branches:
    - release/[0-9]+.[0-9]+
  workflow_dispatch:

concurrency: build

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10
    environment: code-signing

    steps:
      - uses: actions/checkout@v6
        name: Checkout
        with:
          fetch-depth: 0

      - uses: ./.github/actions/build/
        name: Build
        with:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
